                                    {showError('experience') && <div className="field-error">⚠ {errors.experience}</div>}
                                </div>

                                <div className="form-group">
                                    <label>Region <span className="required-dot">*</span></label>
                                    <select
                                        name="region"
                                        value={formData.region}
                                        onChange={handleChange}
                                        className={showError('region') ? 'input-error' : ''}
                                    >
                                        <option value="">Select your region</option>
                                        {REGIONS.map(region => <option key={region} value={region}>{region}</option>)}
                                    </select>
                                    {showError('region') && <div className="field-error">⚠ {errors.region}</div>}
                                </div>
                            </div>

                            <div className="wizard-nav">
                                <button type="button" className="btn-text-danger" onClick={() => setShowClearModal(true)}>
                                    🗑️ Clear all data
                                </button>
                                <div className="wizard-nav-right">
                                    <button type="button" className="btn-primary" onClick={goNext}>
                                        Continue →
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 1 && (
                        <div className={`card ${shake ? 'shake' : ''}`}>
                            <h2 className="card-title">Compensation Details</h2>
                            <p className="card-subtitle">This is the core data that powers your readiness score.</p>

                            <div className="form-grid" style={{marginBottom: '1.5rem'}}>
                                <div className="form-group">
                                    <label>Currency</label>
                                    <select value={formData.currency} onChange={handleCurrencyChange}>
                                        {Object.values(CURRENCIES).map(c => (
                                            <option key={c.label} value={c.code || 'OTHER'}>{c.label}</option>
                                        ))}
                                    </select>
                                    <div className="field-helper">We never convert this, it just formats numbers in your currency.</div>
                                </div>
                            </div>

                            <div className="form-grid">
                                <div className="form-group">
                                    <label>Current Annual Salary <span className="required-dot">*</span></label>
                                    <div className="input-prefix-wrap">
                                        <span className="input-prefix">{CURRENCIES[formData.currency || 'USD'].symbol}</span>
                                        <input
                                            type="text"
                                            inputMode="numeric"
                                            value={formatNumberInput(String(formData.currentSalary))}
                                            onChange={handleNumberChange('currentSalary')}
                                            placeholder="Enter your salary in numbers, e.g. 85000"
                                            className={showError('currentSalary') ? 'input-error' : ''}
                                        />
                                    </div>
                                    <div className="field-helper">Numbers only — your base pay per year, no bonus, equity, or benefits (e.g. 85000).</div>
                                    {showError('currentSalary') && <div className="field-error">⚠ {errors.currentSalary}</div>}
                                </div>

                                <div className="form-group">
                                    <label>Market Average Salary <span className="required-dot">*</span></label>

                                    {estimatedMarketSalary !== null ? (
                                        <React.Fragment>
                                            <div className="market-slider-value">
                                                {formatMoney(sliderValue, formData.currency)}
                                            </div>
                                            <input
                                                type="range"
                                                className="market-slider"
                                                min={sliderBounds.min}
                                                max={sliderBounds.max}
                                                step={sliderBounds.step}
                                                value={sliderValue}
                                                onChange={handleSliderChange}
                                            />
                                            <div className="market-slider-scale">
                                                <span>Lower</span>
                                                <span>Our estimate for {displayRole(formData) || 'your role'}</span>
                                                <span>Higher</span>
                                            </div>
                                            <div className="field-helper">
                                                We've pre-filled this using a rough estimate for your role, experience, and region. Just drag to adjust if it feels too low or too high, no research needed.
                                            </div>
                                            <button
                                                type="button"
                                                className="market-help-link"
                                                onClick={() => setShowExactInput(!showExactInput)}
                                            >
                                                {showExactInput ? '▲ Hide' : '❓ I\'d rather type an exact number'}
                                            </button>
                                            {showExactInput && (
                                                <div className="input-prefix-wrap" style={{marginTop: '0.6rem'}}>
                                                    <span className="input-prefix">{CURRENCIES[formData.currency || 'USD'].symbol}</span>
                                                    <input
                                                        type="text"
                                                        inputMode="numeric"
                                                        value={formatNumberInput(String(formData.marketSalary))}
                                                        onChange={handleNumberChange('marketSalary')}
                                                        placeholder="95,000"
                                                        className={showError('marketSalary') ? 'input-error' : ''}
                                                    />
                                                </div>
                                            )}
                                        </React.Fragment>
                                    ) : (
                                        <div className="input-prefix-wrap">
                                            <span className="input-prefix">{CURRENCIES[formData.currency || 'USD'].symbol}</span>
                                            <input
                                                type="text"
                                                inputMode="numeric"
                                                value={formatNumberInput(String(formData.marketSalary))}
                                                onChange={handleNumberChange('marketSalary')}
                                                placeholder="95,000"
                                                className={showError('marketSalary') ? 'input-error' : ''}
                                            />
                                        </div>
                                    )}
                                    {showError('marketSalary') && <div className="field-error">⚠ {errors.marketSalary}</div>}
                                </div>

                                <div className="form-group">
                                    <label>Number of Months Since Your Last Raise {!formData.neverReceivedHike && <span className="required-dot">*</span>}</label>
                                    <div className="input-prefix-wrap">
                                        <input
                                            type="number"
                                            name="lastHikeMonths"
                                            value={formData.lastHikeMonths}
                                            onChange={handleChange}
                                            placeholder="e.g., 18"
                                            min="0"
                                            max="240"
                                            disabled={formData.neverReceivedHike}
                                            className={showError('lastHikeMonths') ? 'input-error' : ''}
                                        />
                                        <span className="input-suffix">months</span>
                                    </div>
                                    <div className="field-helper">
                                        Enter the number of months in whole numbers, not years (e.g., if it's been 1.5 years, enter 18; if it's been 2 years, enter 24).
                                    </div>
                                    {showError('lastHikeMonths') && <div className="field-error">⚠ {errors.lastHikeMonths}</div>}
                                    <div className="checkbox-container">
                                        <input
                                            type="checkbox"
                                            id="neverReceivedHike"
                                            name="neverReceivedHike"
                                            checked={formData.neverReceivedHike}
                                            onChange={handleChange}
                                        />
                                        <label htmlFor="neverReceivedHike" className="checkbox-label">
                                            I've never received a raise
                                        </label>
                                    </div>
                                </div>
                            </div>

                            {showMarketHelp && (
                                <div className="market-help-panel">
                                    <div className="market-help-title">📍 Quick tip for {formData.region || 'your region'}</div>
                                    <div className="market-help-short">
                                        Search "<strong>{displayRole(formData) || 'your role'} salary</strong>" on one of these, and use the middle value you find:
                                    </div>
                                    <div className="market-help-chips">
                                        {(MARKET_RESOURCES[formData.region] || MARKET_RESOURCES['North America - United States']).map(src => (
                                            <span key={src} className="market-source-chip">{src}</span>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="wizard-nav">
                                <button type="button" className="btn-secondary" onClick={goBack}>← Back</button>
                                <div className="wizard-nav-right">
                                    <button type="button" className="btn-primary" onClick={goNext}>Continue →</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div className="card">
                            <h2 className="card-title">Your Skills</h2>
                            <p className="card-subtitle">Optional, but more skills strengthen your negotiation profile.</p>

                            <div className={`skills-count-banner ${formData.skills.length >= 5 ? 'good' : ''}`}>
                                <span className="skills-count-text">
                                    {formData.skills.length === 0
                                        ? "No skills selected yet. Try adding a few below."
                                        : formData.skills.length < 5
                                        ? `${formData.skills.length} skill${formData.skills.length === 1 ? '' : 's'} selected. Add a few more for a stronger profile.`
                                        : `Nice! ${formData.skills.length} skills selected.`}
                                </span>
                                {formData.skills.length > 0 && (
                                    <button type="button" className="btn-text-danger" onClick={clearSkills}>Clear skills</button>
                                )}
                            </div>

                            <div className="skills-toolbar">
                                <div className="search-wrap">
                                    <span className="search-icon">🔍</span>
                                    <input
                                        type="text"
                                        placeholder="Search skills (e.g., Python, AWS, Design)..."
                                        value={skillSearch}
                                        onChange={(e) => setSkillSearch(e.target.value)}
                                    />
                                </div>
                                <button type="button" className="chip-btn" onClick={addPopularSkills}>
                                    ⭐ Add popular skills for {displayRole(formData) || 'your role'}
                                </button>
                            </div>

                            {Object.keys(filteredCategories).length === 0 ? (
                                <div className="no-results">No skills match "{skillSearch}". Try a different search.</div>
                            ) : (
                                Object.entries(filteredCategories).map(([category, skills]) => {
                                    const isOpen = skillSearch.trim() !== '' || (openCategories && openCategories.has(category));
                                    const selectedCount = skills.filter(s => formData.skills.includes(s)).length;
                                    return (
                                        <div className="skill-category" key={category}>
                                            <button
                                                type="button"
                                                className="skill-category-header"
                                                onClick={() => toggleCategory(category)}
                                            >
                                                <span className="skill-category-title-row">
                                                    {category}
                                                    {selectedCount > 0 && <span className="skill-category-count">{selectedCount}</span>}
                                                </span>
                                                <span className={`skill-category-chevron ${isOpen ? 'open' : ''}`}>▾</span>
                                            </button>
                                            {isOpen && (
                                                <div className="skills-grid">
                                                    {skills.map(skill => {
                                                        const selected = formData.skills.includes(skill);
                                                        return (
                                                            <label
                                                                key={skill}
                                                                className={`skill-item ${selected ? 'selected' : ''}`}
                                                            >
                                                                <input
                                                                    type="checkbox"
                                                                    checked={selected}
                                                                    onChange={() => handleSkillToggle(skill)}
                                                                />
                                                                <span>{skill}</span>
                                                            </label>
                                                        );
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}

                            <div className="wizard-nav">
                                <button type="button" className="btn-secondary" onClick={goBack}>← Back</button>
                                <div className="wizard-nav-right">
                                    <button type="button" className="btn-primary" onClick={goNext}>Continue →</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="card">
                            <h2 className="card-title">Review Your Details</h2>
                            <p className="card-subtitle">Double-check everything looks right before we calculate your score.</p>

                            <div className="review-section">
                                <div className="review-section-header">
                                    <span className="review-section-title">Profile</span>
                                    <button type="button" className="review-edit-link" onClick={() => jumpToStep(0)}>Edit</button>
                                </div>
                                <div className="review-grid">
                                    <div>
                                        <div className="review-item-label">Role</div>
                                        <div className="review-item-value">{displayRole(formData) || '—'}</div>
                                    </div>
                                    <div>
                                        <div className="review-item-label">Experience</div>
                                        <div className="review-item-value">{formData.experience} years</div>
                                    </div>
                                    <div>
                                        <div className="review-item-label">Region</div>
                                        <div className="review-item-value">{formData.region || '—'}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="review-section">
                                <div className="review-section-header">
                                    <span className="review-section-title">Compensation</span>
                                    <button type="button" className="review-edit-link" onClick={() => jumpToStep(1)}>Edit</button>
                                </div>
                                <div className="review-grid">
                                    <div>
                                        <div className="review-item-label">Current Salary</div>
                                        <div className="review-item-value">{formatMoney(formData.currentSalary, formData.currency)}</div>
                                    </div>
                                    <div>
                                        <div className="review-item-label">Market Average</div>
                                        <div className="review-item-value">{formatMoney(formData.marketSalary, formData.currency)}</div>
                                    </div>
                                    <div>
                                        <div className="review-item-label">Last Raise</div>
                                        <div className="review-item-value">
                                            {formData.neverReceivedHike ? 'Never received one' : `${formData.lastHikeMonths} months ago`}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="review-section">
                                <div className="review-section-header">
                                    <span className="review-section-title">Skills ({formData.skills.length})</span>
                                    <button type="button" className="review-edit-link" onClick={() => jumpToStep(2)}>Edit</button>
                                </div>
                                {formData.skills.length === 0 ? (
                                    <div className="empty-note">No skills selected. You can still calculate, but adding skills strengthens your score.</div>
                                ) : (
                                    <div className="review-skills-list">
                                        {formData.skills.map(skill => (
                                            <span className="review-skill-tag" key={skill}>{skill}</span>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="wizard-nav" style={{marginTop: '1.5rem'}}>
                                <button type="button" className="btn-secondary" onClick={goBack}>← Back</button>
                                <div className="wizard-nav-right">
                                    <button type="button" className="btn-text-danger" onClick={() => setShowClearModal(true)}>
                                        🗑️ Start over
                                    </button>
                                    <button type="button" className="btn-primary" onClick={handleFinalSubmit}>
                                        Calculate My Raise Readiness →
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showClearModal && (
                        <ConfirmModal
                            title="Clear all data?"
                            text="This will erase everything you've entered: your profile, compensation details, and selected skills. This can't be undone."
                            confirmLabel="Yes, clear it"
                            onConfirm={handleClearAll}
                            onCancel={() => setShowClearModal(false)}
                        />
                    )}

                    {toast && <div className="toast">✓ {toast}</div>}
                </div>
            );
        }

        function calculateResults(formData) {
            const currentSalary = Number(formData.currentSalary);
            const marketSalary = Number(formData.marketSalary);
            const salaryDiff = ((marketSalary - currentSalary) / currentSalary) * 100;
            const monthsSinceHike = formData.neverReceivedHike ? 999 : parseInt(formData.lastHikeMonths);

            let status = 'fair';
            if (salaryDiff > 10) status = 'underpaid';
            else if (salaryDiff < -10) status = 'overpaid';

            const timePoints = formData.neverReceivedHike
                ? 40
                : Math.min(40, Math.floor(monthsSinceHike / 3) * 5);

            const salaryPoints = Math.min(35, Math.max(0, Math.floor(salaryDiff / 2) + 15));
            const skillPoints = Math.min(25, formData.skills.length * 0.5);

            const score = Math.round(timePoints + salaryPoints + skillPoints);

            let baseHike = 5;
            if (formData.neverReceivedHike) baseHike = 15;
            else if (monthsSinceHike >= 24) baseHike = 12;
            else if (monthsSinceHike >= 18) baseHike = 10;
            else if (monthsSinceHike >= 12) baseHike = 8;

            if (salaryDiff > 15) baseHike += 8;
            else if (salaryDiff > 10) baseHike += 5;
            else if (salaryDiff > 5) baseHike += 3;

            if (formData.skills.length >= 10) baseHike += 3;
            else if (formData.skills.length >= 5) baseHike += 2;

            const safeHike = Math.max(3, Math.floor(baseHike * 0.7));
            const idealHike = baseHike;
            const aggressiveHike = Math.floor(baseHike * 1.4);

            return {
                score,
                scoreBreakdown: { timePoints, salaryPoints, skillPoints },
                status,
                salaryDiff,
                monthsSinceHike,
                neverReceivedHike: formData.neverReceivedHike,
                hikeOptions: {
                    safe: { percent: safeHike, amount: Math.round(currentSalary * (safeHike / 100)) },
                    ideal: { percent: idealHike, amount: Math.round(currentSalary * (idealHike / 100)) },
                    aggressive: { percent: aggressiveHike, amount: Math.round(currentSalary * (aggressiveHike / 100)) }
                }
            };
        }

        const HISTORY_KEY = 'raisecheck_history_v1';

        function loadHistory() {
            try {
                const raw = localStorage.getItem(HISTORY_KEY);
                return raw ? JSON.parse(raw) : [];
            } catch (e) {
                return [];
            }
        }

        function saveHistoryEntry(formData, results) {
            try {
                const history = loadHistory();
                const entry = {
                    date: new Date().toISOString(),
                    role: displayRole(formData) || 'My role',
                    score: results.score,
                    salary: Number(formData.currentSalary),
                    gap: results.salaryDiff
                };
                const updated = [...history, entry].slice(-6);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(updated));
                return updated;
            } catch (e) {
                return loadHistory();
            }
        }

        function CareerMapCard({ formData }) {
            const role = formData.role;
            if (!role || role === 'Other (specify below)') {
                return null;
            }
            const path = getCareerPath(role);
            if (!path) return null;

            const group = path.group;
            const skillsForNext = GROUP_POPULAR_SKILLS[group] || [];
            const skillsToBuild = skillsForNext.filter(s => !formData.skills.includes(s)).slice(0, 4);

            return (
                <div className="card">
                    <h2 className="card-title">Career Map</h2>
                    <p className="card-subtitle">Where {role} can lead next on the {group} track.</p>

                    <div className="career-path">
                        {path.track.map((r, i) => {
                            const isCurrent = i === path.currentIndex;
                            const isNext = i > path.currentIndex && i <= path.currentIndex + 2;
                            const isPast = i < path.currentIndex;
                            return (
                                <div
                                    key={r}
                                    className={`career-step ${isCurrent ? 'current' : ''} ${isNext ? 'next' : ''} ${isPast ? 'past' : ''}`}
                                >
                                    {r}
                                </div>
                            );
                        })}
                    </div>

                    {path.isTopOfTrack ? (
                        <p style={{color: 'var(--text-secondary)', marginTop: '1rem'}}>
                            You're at the top of this track. From here, growth usually means broader scope (bigger team, budget, or company) rather than a new title.
                        </p>
                    ) : (
                        <React.Fragment>
                            <p style={{color: 'var(--text-secondary)', marginTop: '1rem'}}>
                                A common next step from {role} is <strong>{path.next[0]}</strong>
                                {path.next[1] ? <React.Fragment>, and later <strong>{path.next[1]}</strong></React.Fragment> : null}.
                            </p>
                            {skillsToBuild.length > 0 && (
                                <div style={{marginTop: '0.75rem'}}>
                                    <div className="score-explainer-title" style={{marginBottom: '0.5rem'}}>Skills that help you get there</div>
                                    <div className="career-skill-chips">
                                        {skillsToBuild.map(s => <span key={s} className="career-skill-chip">{s}</span>)}
                                    </div>
                                </div>
                            )}
                        </React.Fragment>
                    )}
                </div>
            );
        }

        function Dashboard({ formData, results, onBack }) {
            const [showShareModal, setShowShareModal] = useState(false);
            const [copySuccess, setCopySuccess] = useState(false);
            const [animatedScore, setAnimatedScore] = useState(0);
            const [history, setHistory] = useState([]);
            const chartRef = useRef(null);

            useEffect(() => {
                let start = 0;
                const end = results.score;
                if (end === 0) { setAnimatedScore(0); return; }
                const duration = 900;
                const stepTime = Math.max(Math.floor(duration / end), 10);
                const timer = setInterval(() => {
                    start += 1;
                    setAnimatedScore(start);
                    if (start >= end) clearInterval(timer);
                }, stepTime);
                return () => clearInterval(timer);
            }, [results.score]);

            // Save this check to a lightweight local history so returning
            // users can see how their situation has moved over time, and
            // celebrate with confetti when the case for a raise is strong.
            useEffect(() => {
                const updated = saveHistoryEntry(formData, results);
                setHistory(updated);

                if (results.score >= 60 && typeof confetti === 'function') {
                    const colors = ['#0ea5e9', '#8b5cf6', '#10b981'];
                    confetti({ particleCount: 90, spread: 75, origin: { y: 0.3 }, colors, startVelocity: 35, ticks: 200 });
                    setTimeout(() => confetti({ particleCount: 50, spread: 100, origin: { y: 0.2 }, colors }), 250);
                }
            }, []);

            useEffect(() => {
                if (chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    const chart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['Current', 'Conservative', 'Recommended', 'Ambitious'],
                            datasets: [{
                                label: 'Salary (USD)',
                                data: [
                                    Number(formData.currentSalary),
                                    Number(formData.currentSalary) + results.hikeOptions.safe.amount,
                                    Number(formData.currentSalary) + results.hikeOptions.ideal.amount,
                                    Number(formData.currentSalary) + results.hikeOptions.aggressive.amount
                                ],
                                borderColor: '#0ea5e9',
                                backgroundColor: 'rgba(14, 165, 233, 0.1)',
                                borderWidth: 3,
                                fill: true,
                                tension: 0.4,
                                pointRadius: 6,
                                pointHoverRadius: 8,
                                pointBackgroundColor: '#0ea5e9'
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: {
                                    backgroundColor: '#1e293b',
                                    titleColor: '#f1f5f9',
                                    bodyColor: '#f1f5f9',
                                    borderColor: '#0ea5e9',
                                    borderWidth: 1,
                                    padding: 12,
                                    displayColors: false,
                                    callbacks: {
                                        label: function(context) { return formatMoney(context.parsed.y, formData.currency); }
                                    }
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    ticks: { color: '#64748b', callback: function(value) { return shortMoney(value, formData.currency); } },
                                    grid: { color: '#e2e8f0' }
                                },
                                x: { ticks: { color: '#64748b' }, grid: { display: false } }
                            }
                        }
                    });
                    return () => chart.destroy();
                }
            }, [formData, results]);

            const handleShare = () => setShowShareModal(true);

            const handleCopyShare = () => {
                const shareText = `📊 My Salary Insight (RaiseCheck)

Role: ${displayRole(formData)}
Experience: ${formData.experience} years
Region: ${formData.region}

Market Gap: ${results.salaryDiff > 0 ? '+' : ''}${results.salaryDiff.toFixed(0)}%
Raise Readiness Score: ${results.score}/100
Status: ${scoreConfig.status}

Recommended Raise: ${results.hikeOptions.ideal.percent}%

Know your worth. Negotiate with confidence.`;

                navigator.clipboard.writeText(shareText).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(false), 2000);
                });
            };

            const formatCurrency = (amount) => formatMoney(amount, formData.currency);

            const scoreConfig = {
                color: results.score >= 80 ? '#ef4444' : results.score >= 60 ? '#f59e0b' : results.score >= 40 ? '#0ea5e9' : '#10b981',
                status: results.score >= 80 ? 'Critical - Act Now' : results.score >= 60 ? 'High Priority' : results.score >= 40 ? 'Moderate' : 'Low Priority',
                description: results.score >= 80 ? 'Your compensation needs immediate attention. Strong case for negotiation.' :
                            results.score >= 60 ? 'Good timing to discuss compensation. Build your case with data.' :
                            results.score >= 40 ? 'Consider timing and market conditions before approaching.' :
                            'Focus on building impact and skills before negotiating.'
            };

            // A single plain-English sentence explaining what to actually do -
            // everything else on this page is detail supporting this one line.
            const plainSummary = (() => {
                const pct = results.hikeOptions.ideal.percent;
                const amt = formatCurrency(results.hikeOptions.ideal.amount);
                if (results.neverReceivedHike) {
                    return `You've never had a raise, and that alone is a strong reason to ask. A fair opening ask is about ${pct}% (${amt} more per year).`;
                }
                if (results.score >= 60) {
                    return `You look underpaid for your role right now. This is a good time to ask for about ${pct}% (${amt} more per year).`;
                }
                if (results.score >= 40) {
                    return `Your pay is roughly in the ballpark, but it's been a while. A reasonable ask is around ${pct}% (${amt} more per year).`;
                }
                return `Your pay already looks close to or above market. It may be worth waiting, or focusing on building your case before you ask.`;
            })();

            return (
                <div>
                    <button onClick={onBack} className="btn-back">← Edit My Inputs</button>

                    <div className="card plain-summary-card">
                        <div className="plain-summary-label">🎯 In simple terms</div>
                        <div className="plain-summary-text">{plainSummary}</div>
                    </div>

                    <div className={`card status-card ${results.status}`}>
                        <div className={`status-badge ${results.status}`}>
                            {results.status === 'overpaid' ? '✓ Above Market' :
                             results.status === 'fair' ? '≈ Market Rate' : '⚠ Below Market'}
                        </div>

                        <div className="market-comparison">
                            <div className="comparison-item">
                                <div className="comparison-label">Your Salary</div>
                                <div className="comparison-value">{formatCurrency(formData.currentSalary)}</div>
                            </div>
                            <div className="comparison-item">
                                <div className="comparison-label">Market Average</div>
                                <div className="comparison-value">{formatCurrency(formData.marketSalary)}</div>
                            </div>
                            <div className="comparison-item">
                                <div className="comparison-label">Gap</div>
                                <div className="comparison-value" style={{
                                    color: results.salaryDiff > 0 ? 'var(--accent-danger)' :
                                           results.salaryDiff < 0 ? 'var(--accent-success)' : 'var(--accent-primary)'
                                }}>
                                    {results.salaryDiff > 0 ? '+' : ''}{results.salaryDiff.toFixed(1)}%
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="card">
                        <h2 className="card-title">Raise Readiness Score</h2>

                        <div className="score-container">
                            <div className="score-circle">
                                <svg width="180" height="180" style={{transform: 'rotate(-90deg)'}}>
                                    <circle cx="90" cy="90" r="70" fill="none" stroke="#e2e8f0" strokeWidth="12"/>
                                    <circle
                                        cx="90" cy="90" r="70" fill="none"
                                        stroke={scoreConfig.color} strokeWidth="12"
                                        strokeDasharray={`${2 * Math.PI * 70}`}
                                        strokeDashoffset={`${2 * Math.PI * 70 * (1 - animatedScore / 100)}`}
                                        strokeLinecap="round"
                                        style={{transition: 'stroke-dashoffset 0.3s ease'}}
                                    />
                                </svg>
                                <div className="score-number" style={{color: scoreConfig.color}}>{animatedScore}</div>
                            </div>

                            <div className="score-status" style={{color: scoreConfig.color}}>{scoreConfig.status}</div>
                            <div className="score-description">{scoreConfig.description}</div>
                        </div>

                        <div className="score-explainer">
                            <div className="score-explainer-title">Why this score?</div>
                            <div className="score-breakdown">
                                <div className="score-item">
                                    <span className="score-item-label">
                                        {results.neverReceivedHike ? 'Never received a raise' : 'Time since last raise'}
                                    </span>
                                    <span className="score-item-value">+{results.scoreBreakdown.timePoints}</span>
                                </div>
                                <div className="score-item">
                                    <span className="score-item-label">Salary vs market gap</span>
                                    <span className="score-item-value">+{results.scoreBreakdown.salaryPoints}</span>
                                </div>
                                <div className="score-item">
                                    <span className="score-item-label">Skill strength ({formData.skills.length} skills)</span>
                                    <span className="score-item-value">+{results.scoreBreakdown.skillPoints}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <CareerMapCard formData={formData} />

                    <div className="card">
                        <h2 className="card-title">Raise Suggestions</h2>

                        <p style={{color: 'var(--text-secondary)', marginBottom: '1.5rem'}}>
                            {results.neverReceivedHike
                                ? "Never receiving a raise puts you in a strong position to negotiate. Document your contributions and request fair compensation."
                                : results.status === 'underpaid'
                                ? "Market data indicates strong negotiation leverage. Document your contributions and impact."
                                : results.monthsSinceHike >= 18
                                ? "Significant time has passed since your last adjustment. Consider initiating a discussion."
                                : "Standard compensation adjustment ranges based on your profile and current market conditions."}
                        </p>

                        <div className="hike-options">
                            <div className="hike-option">
                                <div className="hike-label">Conservative</div>
                                <div className="hike-value" style={{color: 'var(--accent-success)'}}>{results.hikeOptions.safe.percent}%</div>
                                <div className="hike-amount">+{formatCurrency(results.hikeOptions.safe.amount)}</div>
                            </div>

                            <div className="hike-option" style={{borderColor: 'var(--accent-primary)'}}>
                                <div className="hike-label">Recommended</div>
                                <div className="hike-value" style={{color: 'var(--accent-primary)'}}>{results.hikeOptions.ideal.percent}%</div>
                                <div className="hike-amount">+{formatCurrency(results.hikeOptions.ideal.amount)}</div>
                            </div>

                            <div className="hike-option">
                                <div className="hike-label">Ambitious</div>
                                <div className="hike-value" style={{color: 'var(--accent-warning)'}}>{results.hikeOptions.aggressive.percent}%</div>
                                <div className="hike-amount">+{formatCurrency(results.hikeOptions.aggressive.amount)}</div>
                            </div>
                        </div>

                        <div className="alert alert-info" style={{marginTop: '1.5rem'}}>
                            <div>
                                💡 <strong>Strategy:</strong> A <strong>{results.hikeOptions.ideal.percent}% increase</strong> aligns with your profile and market position. Support your request with quantifiable achievements.
                            </div>
                        </div>

                        <button onClick={handleShare} className="btn-share">📤 Share My Salary Insight</button>
                    </div>

                    <AskForItSection formData={formData} results={results} formatCurrency={formatCurrency} />

                    {history.length > 1 && (
                        <div className="card">
                            <h2 className="card-title">Your Progress</h2>
                            <p className="card-subtitle">Every check is saved on this device so you can see how your case changes over time.</p>
                            <div className="progress-track">
                                {history.map((h, idx) => {
                                    const isLatest = idx === history.length - 1;
                                    const prev = history[idx - 1];
                                    const delta = prev ? h.score - prev.score : null;
                                    return (
                                        <div key={h.date} className={`progress-node ${isLatest ? 'latest' : ''}`}>
                                            <div className="progress-node-score">{h.score}</div>
                                            <div className="progress-node-date">{new Date(h.date).toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}</div>
                                            {delta !== null && delta !== 0 && (
                                                <div className={`progress-node-delta ${delta > 0 ? 'up' : 'down'}`}>
                                                    {delta > 0 ? '▲' : '▼'} {Math.abs(delta)}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        <h2 className="card-title">Salary Growth Visual</h2>
                        <div className="chart-container"><canvas ref={chartRef}></canvas></div>
                    </div>

                    {showShareModal && (
                        <div className="share-modal" onClick={() => setShowShareModal(false)}>
                            <div className="share-card" onClick={(e) => e.stopPropagation()}>
                                <button className="share-close" onClick={() => setShowShareModal(false)}>×</button>
                                <h3 style={{marginBottom: '1rem', fontFamily: 'JetBrains Mono'}}>Share Your Insight</h3>
                                <div className="share-content">
                                    📊 My Salary Insight (RaiseCheck)
                                    <br/><br/>
                                    Role: {displayRole(formData)}<br/>
                                    Experience: {formData.experience} years<br/>
                                    Region: {formData.region}
                                    <br/><br/>
                                    Market Gap: {results.salaryDiff > 0 ? '+' : ''}{results.salaryDiff.toFixed(0)}%<br/>
                                    Raise Readiness Score: {results.score}/100<br/>
                                    Status: {scoreConfig.status}
                                    <br/><br/>
                                    Recommended Raise: {results.hikeOptions.ideal.percent}%
                                    <br/><br/>
                                    Know your worth. Negotiate with confidence.
                                </div>
                                <button onClick={handleCopyShare} className="btn-copy">
                                    {copySuccess ? '✓ Copied!' : 'Copy to Clipboard'}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function buildAskScripts(formData, results, formatCurrency) {
            const role = displayRole(formData) || 'my role';
            const pct = results.hikeOptions.ideal.percent;
            const amt = formatCurrency(results.hikeOptions.ideal.amount);
            const newTotal = formatCurrency(Number(formData.currentSalary) + results.hikeOptions.ideal.amount);
            const timeframe = results.neverReceivedHike
                ? "I've never had a compensation review since joining"
                : `it's been ${formData.lastHikeMonths} months since my last raise`;

            const callPoints = [
                `Open by asking for a short 1:1: "Do you have 15 to 20 minutes this week to talk about my compensation?"`,
                `State the fact plainly: ${timeframe}.`,
                `Share your research: "Based on what I've found, the market rate for a ${role} is around ${formatCurrency(formData.marketSalary)}."`,
                `List 2–3 concrete wins from the last few months (projects shipped, targets hit, problems solved).`,
                `Make a specific ask: "I'd like to request a raise of about ${pct}%, bringing my salary to around ${newTotal}."`,
                `Ask about process: "What would it take to make this happen, and what's a realistic timeline?"`,
                `If they can't decide on the spot: "No problem, can we follow up by [date] with next steps?"`
            ];

            const emailSubject = `Requesting a compensation review`;
            const emailBody = `Hi [Manager's Name],

I hope you're doing well. I'd like to request some time to discuss my compensation.

${results.neverReceivedHike
    ? "I haven't had a compensation review since I joined, and"
    : `It's been ${formData.lastHikeMonths} months since my last raise, and`} based on my research into current market rates for a ${role}, I believe there's a gap between my current pay and the market.

Over the past few months, I've contributed to [mention 1-2 specific achievements, e.g., a project delivered, a metric improved, added responsibilities]. Given this, I'd like to request a raise of around ${pct}%, which would bring my salary to approximately ${newTotal}.

Could we find some time this week or next to discuss this? I'm happy to share more detail on my research and contributions.

Thank you for considering this,
[Your Name]`;

            const whatsappMessage = `Hi [Manager's name], hope you're doing well! 🙂 Could we grab some time this week to chat about my compensation? ${results.neverReceivedHike ? "I haven't had a review since joining" : `It's been a while since my last raise (${formData.lastHikeMonths} months)`}, and I've done some research on market rates I'd like to walk you through. Let me know what time works for you!`;

            return { callPoints, emailSubject, emailBody, whatsappMessage };
        }

        function AskForItSection({ formData, results, formatCurrency }) {
            const [activeTab, setActiveTab] = useState('call');
            const [copied, setCopied] = useState(false);
            const scripts = useMemo(() => buildAskScripts(formData, results, formatCurrency), [formData, results]);

            const handleCopy = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                });
            };

            const tabs = [
                { id: 'call', label: '📞 Talking Points' },
                { id: 'email', label: '📧 Email' },
                { id: 'whatsapp', label: '💬 WhatsApp' }
            ];

            return (
                <div className="card">
                    <h2 className="card-title">How to Ask For It</h2>
                    <p className="card-subtitle">Ready-to-use scripts for the conversation, email, or a quick message. Edit the [bracketed] parts before sending.</p>

                    <div className="ask-tabs">
                        {tabs.map(tab => (
                            <button
                                key={tab.id}
                                type="button"
                                className={`ask-tab ${activeTab === tab.id ? 'active' : ''}`}
                                onClick={() => setActiveTab(tab.id)}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    {activeTab === 'call' && (
                        <div className="ask-content">
                            <ol className="ask-call-list">
                                {scripts.callPoints.map((point, idx) => (
                                    <li key={idx}>{point}</li>
                                ))}
                            </ol>
                            <button
                                className="btn-copy-small"
                                onClick={() => handleCopy(scripts.callPoints.map((p, i) => `${i + 1}. ${p}`).join('\n'))}
                            >
                                {copied ? '✓ Copied!' : '📋 Copy talking points'}
                            </button>
                        </div>
                    )}

                    {activeTab === 'email' && (
                        <div className="ask-content">
                            <div className="ask-email-subject"><strong>Subject:</strong> {scripts.emailSubject}</div>
                            <div className="ask-template-box">{scripts.emailBody}</div>
                            <button
                                className="btn-copy-small"
                                onClick={() => handleCopy(`Subject: ${scripts.emailSubject}\n\n${scripts.emailBody}`)}
                            >
                                {copied ? '✓ Copied!' : '📋 Copy email'}
                            </button>
                        </div>
                    )}

                    {activeTab === 'whatsapp' && (
                        <div className="ask-content">
                            <div className="ask-template-box ask-whatsapp-box">{scripts.whatsappMessage}</div>
                            <button
                                className="btn-copy-small"
                                onClick={() => handleCopy(scripts.whatsappMessage)}
                            >
                                {copied ? '✓ Copied!' : '📋 Copy message'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [showDashboard, setShowDashboard] = useState(false);
            const [formData, setFormData] = useState(null);
            const [results, setResults] = useState(null);

            const handleSubmit = (data) => {
                setFormData(data);
                setResults(calculateResults(data));
                setShowDashboard(true);
                window.scrollTo(0, 0);
            };

            const handleBack = () => {
                setShowDashboard(false);
                window.scrollTo(0, 0);
            };

            return (
                <div className="container">
                    <div className="header">
                        <div className="logo">RaiseCheck</div>
                        <div className="tagline">Find out if you deserve a raise, in about 2 minutes.</div>
                        <div className="tagline-badge"><span className="pulse-dot"></span>Free, private, no signup</div>
                    </div>

                    {!showDashboard ? (
                        <InputForm onSubmit={handleSubmit} />
                    ) : (
                        <Dashboard formData={formData} results={results} onBack={handleBack} />
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
